services:
  - type: web
    name: chess-iliyas-backend
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: chess-iliyas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: chess-iliyas-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: STOCKFISH_PATH
        value: ./bin/stockfish
      - key: FRONTEND_URL
        sync: false
      - key: DB_SYNCHRONIZE
        value: "true"

  - type: static
    name: chess-iliyas-frontend
    region: oregon
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: chess-iliyas-db
    databaseName: chess_iliyas_db
    user: chess_iliyas_db_user
    plan: free
    region: oregon
    version: "16"
